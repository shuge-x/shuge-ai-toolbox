name: with-review
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: 变更提案文档
    template: proposal.md
    instruction: |
      创建变更提案文档，说明为什么需要这个变更。

      必须包含以下章节：

      - **为什么**：1-2 句话说明问题或机会。解决什么问题？为什么现在做？
      - **变更内容**：用列表说明具体变更。包括新增能力、修改、移除。标记 breaking change。
      - **能力清单**：识别需要创建或修改的 specs：
        - **新增能力**：列出本次引入的能力，每个对应一个 `specs/<name>/spec.md`，使用 kebab-case 命名（如 `user-auth`、`data-export`）
        - **修改能力**：列出需求有变更的已有能力。仅包含 spec 层面的行为变更（不含实现细节）。每个需要 delta spec 文件。先检查 `openspec/specs/` 下已有的 spec 名称。如无需求变更则留空
      - **影响范围**：受影响的代码、API、依赖或系统

      重要：能力清单是 proposal 和 specs 阶段的契约。填写前先研究已有的 specs。
      每个列出的能力都需要一个对应的 spec 文件。

      保持简洁（1-2 页）。聚焦「为什么」而非「怎么做」——实现细节属于 design.md。
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: 变更的详细规格说明
    template: spec.md
    instruction: |
      创建规格文件，定义系统应该做什么。

      为 proposal 能力清单中的每个能力创建一个 spec 文件。
      - 新增能力：使用 proposal 中的 kebab-case 名称（specs/<capability>/spec.md）
      - 修改能力：使用已有的 spec 目录名（openspec/specs/<capability>/），在 specs/<capability>/spec.md 创建 delta spec

      Delta 操作（使用 ## 标题）：
      - **新增需求（ADDED）**：新能力
      - **修改需求（MODIFIED）**：行为变更——必须包含完整的更新内容
      - **移除需求（REMOVED）**：废弃的功能——必须包含**原因**和**迁移方案**
      - **重命名需求（RENAMED）**：仅名称变更——使用 FROM:/TO: 格式

      格式要求：
      - 每个需求：`### Requirement: <name>` 后跟描述
      - 使用 SHALL/MUST 表示规范性需求（避免 should/may）
      - 每个场景：`#### Scenario: <name>` 使用 WHEN/THEN 格式
      - **关键**：场景必须使用 4 个井号（`####`）。使用 3 个井号或列表会静默失败
      - 每个需求至少有一个场景

      修改需求的工作流：
      1. 在 openspec/specs/<capability>/spec.md 中定位已有需求
      2. 复制整个需求块（从 `### Requirement:` 到所有场景）
      3. 粘贴到 `## MODIFIED Requirements` 下并编辑为新的行为
      4. 确保标题文本完全匹配（忽略空格差异）

      常见陷阱：使用 MODIFIED 但只写部分内容会导致归档时丢失细节。
      如果只是添加新关注点而不改变已有行为，使用 ADDED。

      Spec 应该是可测试的——每个场景都是一个潜在的测试用例。
    requires:
      - proposal
  - id: design
    generates: design.md
    description: 技术设计文档
    template: design.md
    instruction: |
      创建技术设计文档，说明如何实现这个变更。

      何时需要 design.md（满足任一即创建）：
      - 跨模块变更或需要新的架构模式
      - 引入新外部依赖或重大数据模型变更
      - 涉及安全、性能或迁移复杂性
      - 存在模糊性，需要在编码前做技术决策

      必须包含以下章节：
      - **背景**：现状、约束、利益相关者
      - **目标 / 非目标**：本设计要达成的和明确排除的
      - **关键决策**：技术选型及理由（为什么选 X 不选 Y？）。每个决策列出考虑过的替代方案
      - **风险与权衡**：已知限制、可能出问题的地方。格式：[风险] → 缓解措施
      - **迁移方案**：部署步骤、回滚策略（如适用）
      - **待定问题**：尚未解决的设计决策或未知项

      聚焦架构和方案，不要逐行描述实现。
      参考 proposal 了解动机，参考 specs 了解需求。

      好的设计文档解释技术决策背后的「为什么」。
    requires:
      - proposal
  - id: review
    generates: review.md
    description: Five-dimension review before tasks generation
    template: review.md
    instruction: |
      从五个维度审查所有工件的完整性和质量。

      审查维度：
      1. **边界条件**：Spec 是否覆盖 null、空值、越界等异常场景
      2. **回滚方案**：数据库变更是否包含回滚策略
      3. **测试覆盖**：Design 是否明确了需要测试的场景和用例
      4. **向后兼容**：是否分析了现有接口和数据的兼容性影响
      5. **任务粒度**（最重要）：tasks.md 的每个 step 是否达到 2-5 分钟粒度、是否附带完整代码、是否有占位符

      对维度 5 的检查标准：
      - ✅ 通过：每个 step 有完整代码块 + 运行命令 + 预期输出
      - ⚠️ 警告：部分 step 缺少代码或命令
      - ❌ 失败：存在占位符（TBD/TODO）或 step 粒度超过 10 分钟

      输出格式：
      - 每个维度给出明确状态：✅ 通过 / ⚠️ 警告 / ❌ 失败
      - 警告和失败必须给出具体建议
      - 给出整体评估 + 针对 tasks.md 的具体建议
    requires:
      - proposal
      - specs
      - design
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      创建细粒度的实现计划。每个任务的工作量应在 2-5 分钟之间。

      ## 任务格式（必须严格遵守）

      每个任务必须遵循以下格式：

      ````markdown
      ### 任务 N：[组件名称]

      **涉及文件：**
      - 新建/修改：exact/path/to/file
      - 测试：tests/exact/path/to/test

      - [ ] **第 1 步：写失败测试**
      ```typescript
      test('具体行为描述', () => {
        const result = function(input);
        expect(result).toBe(expected);
      });
      ```

      - [ ] **第 2 步：运行测试——确认失败**
      命令：`npx vitest run tests/path/test.ts`
      预期：FAIL — function is not defined

      - [ ] **第 3 步：写最小实现**
      ```typescript
      export function function(input: Type): ReturnType {
        return expected;
      }
      ```

      - [ ] **第 4 步：运行测试——确认通过**
      命令：`npx vitest run tests/path/test.ts`
      预期：PASS

      - [ ] **第 5 步：提交**
      ```bash
      git add tests/path/test.ts src/path/file.ts
      git commit -m "feat: 具体描述"
      ```
      ````

      ## 禁止事项（出现即视为计划不合格）

      - 「TBD」「TODO」「implement later」「fill in details」
      - 「添加适当的错误处理」（必须写出具体代码）
      - 「为以上代码写测试」（必须写出具体测试代码）
      - 只描述做什么但不展示怎么做
      - 引用在任何 task 中都未定义的类型或函数

      ## 规则

      - 必须给出精确的文件路径
      - 每个步骤必须包含完整代码——涉及代码修改的步骤，必须展示修改后的代码
      - 必须给出精确的运行命令和预期输出
      - 每个测试只验证一个行为
      - DRY、YAGNI——只写能通过测试的最小实现
      - 参考 review.md 的建议来确定任务优先级和拆分方向
    requires:
      - specs
      - design
      - review
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
